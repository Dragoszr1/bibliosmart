# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name bibliosmart.online www.bibliosmart.online;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name bibliosmart.online www.bibliosmart.online;

    ssl_certificate     /etc/ssl/biblioteca/biblioteca.crt;
    ssl_certificate_key /etc/ssl/biblioteca/biblioteca.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Serve Vue.js static build
    root /home/dragoszr/biblioteca-repo/frontend/dist;
    index index.html;

    # SPA fallback — all non-file routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Flask/Gunicorn
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Required for file uploads
        client_max_body_size 10M;
    }
}
